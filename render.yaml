services:
  - type: web
    name: garmin-data-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /
    disk:
      name: app-data
      mountPath: /opt/render/project/src/storage
      sizeGB: 5
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /opt/render/project/src/storage/users.db
      - key: PYTHON_VERSION
        value: 3.13.5
